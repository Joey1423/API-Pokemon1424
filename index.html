<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Arena</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=IBM+Plex+Sans:wght@400;600&display=swap');

      :root {
        --ink: #171b24;
        --soft: #677087;
        --line: #d9deea;
        --brand: #f3692d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'IBM Plex Sans', sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 10%, rgba(255, 180, 144, 0.52), transparent 35%),
          radial-gradient(circle at 85% 15%, rgba(255, 234, 152, 0.6), transparent 30%),
          linear-gradient(155deg, #f7f9ff 0%, #ecf1fb 100%);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(900px, 100%);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(5px);
        border-radius: 24px;
        padding: clamp(18px, 4vw, 34px);
        box-shadow: 0 20px 46px rgba(20, 26, 40, 0.14);
        animation: rise 0.65s ease;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 52px);
        line-height: 1;
        font-family: 'Bricolage Grotesque', sans-serif;
      }

      p {
        margin: 0;
        color: var(--soft);
      }

      .badges {
        margin-top: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .badge {
        font-size: 13px;
        font-weight: 700;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid #efc1a8;
        background: #fff2eb;
        color: #9b3e1d;
        transform: translateY(0);
        animation: float 4.5s ease-in-out infinite;
      }

      .badge:nth-child(2) {
        animation-delay: 0.2s;
      }

      .badge:nth-child(3) {
        animation-delay: 0.4s;
      }

      .badge:nth-child(4) {
        animation-delay: 0.6s;
      }

      .actions {
        margin-top: 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        border: 0;
        text-decoration: none;
        padding: 11px 14px;
        border-radius: 11px;
        font-weight: 700;
      }

      .btn.main {
        background: linear-gradient(120deg, var(--brand), #ff8a4e 72%);
        color: #fff;
      }

      .btn.alt {
        background: #fff;
        color: #3f4658;
        border: 1px solid var(--line);
      }

      .grid {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 10px;
      }

      .tile {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        padding: 12px;
      }

      .tile strong {
        display: block;
        font-size: 23px;
        font-family: 'Bricolage Grotesque', sans-serif;
      }

      .tile span {
        color: var(--soft);
        font-size: 13px;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-3px);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Pokemon Arena</h1>
      <p>Page HTML statique prête à déployer sur Vercel.</p>

      <div class="badges">
        <span class="badge">Design moderne</span>
        <span class="badge">Animations fluides</span>
        <span class="badge">100% responsive</span>
        <span class="badge">Deployment Vercel</span>
      </div>

      <div class="grid">
        <article class="tile">
          <strong>Static</strong>
          <span>Aucun backend requis</span>
        </article>
        <article class="tile">
          <strong>Fast</strong>
          <span>Chargement ultra rapide</span>
        </article>
        <article class="tile">
          <strong>Ready</strong>
          <span>Déployable immédiatement</span>
        </article>
      </div>

      <div class="actions">
        <a class="btn main" href="#">Site en ligne</a>
        <a class="btn alt" href="#">Personnaliser</a>
      </div>
    </main>
  </body>
</html>
